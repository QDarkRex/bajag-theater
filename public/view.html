<!DOCTYPE html>
<html lang="en" data-theme="valentine">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bajag Theater</title>
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@100;200;300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link href="/css/video-js.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/output.css" type="text/css">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
</head>

<body>

  <head>
    <div class="navbar bg-primary text-primary-content">
      <button class="btn btn-ghost text-xl">Bajag Theater</button>
    </div>
  </head>

  <section class="mx-6 grid grid-cols-1 md:grid-cols-2 gap-8">
    <div class="flex flex-col">
      <p class="text-left my-4 md:my-10 font-semibold text-md md:text-2xl">Enjoy Theater Tidak Perlu Pusing Fulus</p>
      <video-js id=vid1 class="flex-1 vjs-default-skin video-js vjs-fluid rounded-md" controls>
        <source src="/livestream/output.m3u8" type="application/x-mpegURL">
      </video-js>
      <div class="py-2 flex flex-col md:flex-row items-center gap-2">
        <p class="whitespace-nowrap">Lag? coba gunakan link ini di VLC:
        <div class="join flex-1">
          <div class="w-full">
            <label class="input join-item w-full">
              <input disabled id="vlc_link" type="text" value="" />
            </label>
          </div>
          <button id="copy" class="btn btn-neutral join-item">Copy</button>
        </div>
      </div>
      <div class="rounded-md bg-base-200 py-4 px-3 mt-3">
        <p class="font-semibold text-md md:text-xl">Stream Control</p>
        <div class="grid grid-cols-1 gap-3 mt-3">
          <label class="form-control">
            <span class="label-text">IDN Live URL</span>
            <input id="idn_live_url" class="input input-bordered w-full" type="url"
              placeholder="https://www.idn.app/member/live/slug" />
          </label>
          <label class="form-control">
            <span class="label-text">IDN Username</span>
            <input id="idn_username" class="input input-bordered w-full" type="text" placeholder="jkt48_levi" />
          </label>
          <div class="flex flex-col md:flex-row gap-2">
            <button id="save_stream" class="btn btn-primary">Save Stream</button>
            <button id="refresh_stream" class="btn btn-neutral">Save & Refresh</button>
          </div>
          <label class="form-control">
            <span class="label-text">Cookies</span>
            <textarea id="cookies_input" class="textarea textarea-bordered min-h-28"
              placeholder="Paste Netscape cookies or Cookie header"></textarea>
          </label>
          <button id="save_cookies" class="btn btn-secondary">Save Cookies</button>
          <p id="stream_status" class="text-sm min-h-5"></p>
        </div>
      </div>
    </div>
    </div>

    <div class="flex flex-col">
      <p class="hidden md:block md:text-right text-md md:text-2xl font-semibold md:my-10" id="date"></p>
      <div class="rounded-md md:px-4 rounded-md bg-base-200 py-4 px-3 flex-1">
        <p class="font-semibold text-md md:text-2xl">Jadwal</p>
        <div class="overflow-x-auto rounded-box border border-base-content/5 bg-base-100 mt-4">
          <table class="table">
            <tbody>
              <tr>
                <td class="text-xl">Minggu</td>
                <td id="day1" class="flex items-center gap-4">12.00</td>
              </tr>
              <tr>
                <td class="text-xl">Senin</td>
                <td id="day2" class="flex items-center gap-4">12.00</td>
              </tr>
              <tr>
                <td class="text-xl">Selasa</td>
                <td id="day3" class="flex items-center gap-4">12.00</td>
              </tr>
              <tr>
                <td class="text-xl">Rabu</td>
                <td id="day4" class="flex items-center gap-4">12.00</td>
              </tr>
              <tr>
                <td class="text-xl">Kamis</td>
                <td id="day5" class="flex items-center gap-4">12.00</td>
              </tr>
              <tr>
                <td class="text-xl">Jumat</td>
                <td id="day6" class="flex items-center gap-4">12.00</td>
              </tr>
              <tr>
                <td class="text-xl">Sabtu</td>
                <td id="day7" class="flex items-center gap-4">12.00</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
      <div class="flex items-center justify-center my-2">
        <a href="https://saweria.co/upscale48" target="_blank"
          class="relative group flex flex-row justify-center min-w-[300px] bg-primary border border-black rounded-lg px-5">
          <h1 class="text-white my-auto text-3xl font-[Comfortaa] px-4">Dukung kami agar server tetap hidup</h1>
          <div
            class="absolute bg-black rounded-lg -z-10 w-full h-full mt-2 ml-4 group-active:ml-2 group-active:mt-1 duration-100">
          </div>
        </a>
      </div>

    </div>

    <div class="md:col-span-2 rounded-md md:px-4 rounded-md bg-base-200 py-4 px-3">
      <p class="font-semibold text-md md:text-2xl">Replay</p>
      <p>Pindah dulu yages ->
        <small><a href="https://var.bajag-theater.my.id" target="_blank"
            rel="noopener noreferer">https://var.bajag-theater.my.id</a>
        </small>
      </p>
    </div>

  </section>

  <script src="/js/video.min.js"></script>
  <script>
    var vlc_link = document.querySelector("#vlc_link");
    var currentLocation = window.location;
    vlc_link.value = `${currentLocation.origin}/livestream/output.m3u8`;
    var player = videojs('vid1', {
      responsive: true
    });
    const playPromise = player.play();
    if (playPromise?.catch) {
      playPromise.catch(() => {});
    }

    var dateElement = document.querySelector("#date");
    var options = {
      weekday: 'long',
      day: '2-digit',
      month: '2-digit',
      year: 'numeric'
    };
    var currentDate = new Date();
    var formattedDate = currentDate.toLocaleDateString('id-ID', options);

    formattedDate = formattedDate.replace(/\//g, '-');

    dateElement.innerText = formattedDate;

    function updateClipboard(newClip) {
      navigator.clipboard.writeText(newClip).then(
        () => {
          alert("Copied!")
          /* clipboard successfully set */
        },
        (err) => {
          console.log(err)
          alert("Failed copy interaction!")
          /* clipboard write failed */
        },
      );
    };

    // Function to parse an event date from "bulan_tahun" (e.g. "Mar 2025") and "tanggal"
    const parseEventDate = (event) => {
      // Split the "bulan_tahun" string into month and year.
      const [monthStr, yearStr] = event.bulan_tahun.split(" ");
      // Create a date object from the month string. Using "1" as the day to ensure proper parsing.
      const tempDate = new Date(`${monthStr} 1, ${yearStr}`);
      const monthIndex = tempDate.getMonth(); // 0-based index
      const day = parseInt(event.tanggal, 10);
      const year = parseInt(yearStr, 10);
      return new Date(year, monthIndex, day);
    };

    var copyBtn = document.querySelector("#copy");
    copyBtn.addEventListener("click", () => {
      updateClipboard(vlc_link.value);
    })

    var idnLiveUrlInput = document.querySelector("#idn_live_url");
    var idnUsernameInput = document.querySelector("#idn_username");
    var cookiesInput = document.querySelector("#cookies_input");
    var saveStreamBtn = document.querySelector("#save_stream");
    var saveCookiesBtn = document.querySelector("#save_cookies");
    var refreshStreamBtn = document.querySelector("#refresh_stream");
    var streamStatus = document.querySelector("#stream_status");

    function setStreamStatus(message) {
      streamStatus.innerText = message;
    }

    function reloadPlayer() {
      player.src({
        src: `/livestream/output.m3u8?t=${Date.now()}`,
        type: "application/x-mpegURL",
      });

      const nextPlayPromise = player.play();
      if (nextPlayPromise?.catch) {
        nextPlayPromise.catch(() => {});
      }
    }

    function schedulePlayerReload() {
      window.setTimeout(reloadPlayer, 16000);
    }

    async function loadStreamSettings() {
      try {
        const response = await fetch("/livestream/settings");
        const settings = await response.json();
        idnLiveUrlInput.value = settings.responseObject?.idnLiveUrl || "";
        idnUsernameInput.value = settings.responseObject?.idnUsername || "";
        setStreamStatus(settings.responseObject?.cookiesConfigured ? "Cookies saved" : "");
      } catch (err) {
        console.log(err);
        setStreamStatus("Failed loading stream settings");
      }
    }

    async function postJson(url, payload) {
      const response = await fetch(url, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify(payload),
      });

      if (!response.ok) {
        throw new Error(`Request failed: ${response.status}`);
      }

      return response.json();
    }

    async function saveStreamSettings() {
      await postJson("/livestream/settings", {
        idnLiveUrl: idnLiveUrlInput.value,
        idnUsername: idnUsernameInput.value,
      });
    }

    saveStreamBtn.addEventListener("click", async () => {
      saveStreamBtn.disabled = true;
      setStreamStatus("Saving stream...");
      try {
        await saveStreamSettings();
        setStreamStatus("Stream saved. Refreshing...");
        schedulePlayerReload();
      } catch (err) {
        console.log(err);
        setStreamStatus("Failed saving stream");
      } finally {
        saveStreamBtn.disabled = false;
      }
    });

    saveCookiesBtn.addEventListener("click", async () => {
      saveCookiesBtn.disabled = true;
      setStreamStatus("Saving cookies...");
      try {
        await postJson("/livestream/cookies", {
          cookies: cookiesInput.value,
        });
        cookiesInput.value = "";
        setStreamStatus("Cookies saved. Refreshing...");
        schedulePlayerReload();
      } catch (err) {
        console.log(err);
        setStreamStatus("Failed saving cookies");
      } finally {
        saveCookiesBtn.disabled = false;
      }
    });

    refreshStreamBtn.addEventListener("click", async () => {
      refreshStreamBtn.disabled = true;
      saveStreamBtn.disabled = true;
      setStreamStatus("Saving and refreshing stream...");
      try {
        await saveStreamSettings();
        await postJson("/livestream/refresh", {});
        setStreamStatus("Refresh requested. Reloading player...");
        schedulePlayerReload();
      } catch (err) {
        console.log(err);
        setStreamStatus("Failed saving or refreshing stream");
      } finally {
        refreshStreamBtn.disabled = false;
        saveStreamBtn.disabled = false;
      }
    });

    loadStreamSettings();

    fetch("/schedule/events").then((data) => {
      var json = data.json().then((events) => {
        // Determine the start (Sunday) and end (Saturday) of the current week.
        const now = new Date();
        const startOfWeek = new Date(now);
        startOfWeek.setDate(now.getDate() - now.getDay()); // Sunday
        startOfWeek.setHours(0, 0, 0, 0); // clear time
        const endOfWeek = new Date(startOfWeek);
        endOfWeek.setDate(startOfWeek.getDate() + 6);
        endOfWeek.setHours(23, 59, 59, 999); // end of Saturday

        // Filter events that occur during the current week.
        const eventsThisWeek = events.responseObject.filter(event => {
          const eventDate = parseEventDate(event);
          return eventDate >= startOfWeek && eventDate <= endOfWeek;
        });

        for (let i = 1; i <= 7; i++) {
          const event = eventsThisWeek[i - 1];
          document.querySelector(`#day${i}`).innerHTML = event?.event_name ? `<p class="px-3 rounded-md py-2 bg-primary text-white font-semibold">${event.event_time}<p/> ${event.event_name}` : "";
        }
      })
    });

  </script>
</body>

</html>
